<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Descent</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cinzel:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow-x: hidden;
            background: #000;
            font-family: 'Orbitron', monospace;
            cursor: none;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        #depth-meter {
            position: fixed;
            top: 40px;
            right: 40px;
            text-align: right;
            z-index: 100;
        }
        
        #depth-meter .label {
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }
        
        #depth-meter .value {
            color: #fff;
            font-size: 3rem;
            font-weight: 700;
            text-shadow: 0 0 20px currentColor;
            line-height: 1;
        }
        
        #depth-meter .unit {
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
        
        #layer-indicator {
            position: fixed;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 8px;
            opacity: 0.8;
            transition: all 0.5s;
            font-family: 'Cinzel', serif;
        }
        
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }
        
        #start-screen h1 {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            color: #fff;
            letter-spacing: 15px;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(255,255,255,0.5);
            animation: titlePulse 3s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { opacity: 0.8; text-shadow: 0 0 40px rgba(255,255,255,0.3); }
            50% { opacity: 1; text-shadow: 0 0 60px rgba(255,255,255,0.8); }
        }
        
        #start-screen p {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }
        
        #start-btn {
            padding: 20px 60px;
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        #start-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
        }
        
        #audio-indicator {
            position: fixed;
            bottom: 40px;
            right: 40px;
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #audio-indicator.active {
            color: #0ff;
        }
        
        .audio-wave {
            display: flex;
            gap: 3px;
            align-items: center;
            height: 15px;
        }
        
        .audio-wave span {
            width: 2px;
            background: currentColor;
            animation: wave 1s ease-in-out infinite;
        }
        
        .audio-wave span:nth-child(1) { height: 5px; animation-delay: 0s; }
        .audio-wave span:nth-child(2) { height: 10px; animation-delay: 0.1s; }
        .audio-wave span:nth-child(3) { height: 15px; animation-delay: 0.2s; }
        .audio-wave span:nth-child(4) { height: 10px; animation-delay: 0.3s; }
        .audio-wave span:nth-child(5) { height: 5px; animation-delay: 0.4s; }
        
        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }
        
        .hidden {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        
        #custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1001;
            mix-blend-mode: difference;
            transition: transform 0.1s;
        }
        
        #custom-cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>INFINITE DESCENT</h1>
        <p>SCROLL TO DIVE · MOVE TO INTERACT</p>
        <button id="start-btn">ENTER THE VOID</button>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="depth-meter">
            <div class="label">CURRENT DEPTH</div>
            <div class="value" id="depth-value">0</div>
            <div class="unit">METERS</div>
        </div>
        
        <div id="layer-indicator">ATMOSPHERE</div>
        
        <div id="audio-indicator">
            <span>AUDIO</span>
            <div class="audio-wave">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>
    </div>
    
    <div id="custom-cursor"></div>

    <script>
        // Audio Context
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let masterGain;
        let oscillators = [];
        let isAudioStarted = false;
        
        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        // Game state
        let scrollY = 0;
        let targetScrollY = 0;
        let mouseX = 0;
        let mouseY = 0;
        let gameStarted = false;
        let time = 0;
        
        // Entities
        const obstacles = [];
        const orbs = [];
        const particles = [];
        const floatingShapes = [];
        
        // Configuration
        const OBSTACLE_DENSITY = 250;
        const ORB_SPACING = 300;
        const LAYERS = {
            SKY: { end: 2000, color: [135, 206, 235], name: 'ATMOSPHERE' },
            OCEAN: { end: 6000, color: [0, 105, 148], name: 'OCEAN' },
            ABYSS: { end: 12000, color: [25, 25, 112], name: 'ABYSS' },
            VOID: { end: Infinity, color: [0, 0, 0], name: 'VOID' }
        };
        
        // Resize
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // Mouse tracking
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            const cursor = document.getElementById('custom-cursor');
            cursor.style.left = mouseX - 10 + 'px';
            cursor.style.top = mouseY - 10 + 'px';
        });
        
        // Touch support
        document.addEventListener('touchmove', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: true });
        
        // Scroll handling
        window.addEventListener('scroll', () => {
            if (gameStarted) {
                targetScrollY = window.scrollY;
            }
        });
        
        // Audio setup
        function initAudio() {
            audioCtx = new AudioContext();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.3;
            masterGain.connect(audioCtx.destination);
            
            createDrone();
            isAudioStarted = true;
            document.getElementById('audio-indicator').classList.add('active');
        }
        
        function createDrone() {
            const freqs = [55, 110, 220, 440];
            
            freqs.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = i % 2 === 0 ? 'sine' : 'triangle';
                osc.frequency.value = freq;
                
                gain.gain.value = 0.05 / (i + 1);
                
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start();
                
                oscillators.push({ osc, gain, baseFreq: freq });
            });
        }
        
        function updateAudio(depth) {
            if (!isAudioStarted) return;
            
            const layer = getCurrentLayer(depth);
            let multiplier = 1;
            
            switch(layer.name) {
                case 'SKY': multiplier = 1; break;
                case 'OCEAN': multiplier = 0.5; break;
                case 'ABYSS': multiplier = 0.25; break;
                case 'VOID': multiplier = 0.125; break;
            }
            
            oscillators.forEach((o, i) => {
                const targetFreq = o.baseFreq * multiplier * (1 + i * 0.1);
                o.osc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
            });
        }
        
        // Utility functions
        function getCurrentLayer(depth) {
            if (depth < LAYERS.SKY.end) return LAYERS.SKY;
            if (depth < LAYERS.OCEAN.end) return LAYERS.OCEAN;
            if (depth < LAYERS.ABYSS.end) return LAYERS.ABYSS;
            return LAYERS.VOID;
        }
        
        function lerp(a, b, t) {
            return a + (b - a) * t;
        }
        
        function rgbToString(r, g, b, a = 1) {
            return `rgba(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)}, ${a})`;
        }
        
        // OBSTACLE CLASS
        class Obstacle {
            constructor(y) {
                this.y = y;
                this.x = Math.random() * (width - 100) + 50;
                this.size = 40 + Math.random() * 80;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.03;
                this.hue = Math.random() * 360;
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.03;
                
                // Shape types: 0=ring, 1=star, 2=cross, 3=spiral, 4=gear, 5=crystal
                this.shape = Math.floor(Math.random() * 6);
                
                // Movement pattern
                this.moveType = Math.floor(Math.random() * 3);
                this.moveSpeed = 0.5 + Math.random() * 1.5;
                this.moveRange = 100 + Math.random() * 150;
                this.originX = this.x;
                this.movePhase = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.rotation += this.rotSpeed;
                this.pulse += this.pulseSpeed;
                
                if (this.moveType === 1) {
                    this.x = this.originX + Math.sin(this.movePhase) * this.moveRange;
                    this.movePhase += 0.02;
                } else if (this.moveType === 2) {
                    this.x = this.originX + Math.cos(this.movePhase) * (this.moveRange * 0.5);
                    this.movePhase += 0.015;
                }
                
                const screenY = this.y - scrollY;
                const dx = this.x - mouseX;
                const dy = screenY - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 150) {
                    const force = (150 - dist) / 150;
                    this.x += dx * force * 0.08;
                    this.rotation += force * 0.15;
                }
            }
            
            draw(ctx, depth) {
                const screenY = this.y - scrollY;
                if (screenY < -200 || screenY > height + 200) return;
                
                const layer = getCurrentLayer(depth);
                const pulseScale = 1 + Math.sin(this.pulse) * 0.15;
                
                ctx.save();
                ctx.translate(this.x, screenY);
                ctx.rotate(this.rotation);
                ctx.scale(pulseScale, pulseScale);
                
                let color, glowColor;
                if (layer.name === 'SKY') {
                    color = `hsla(${this.hue}, 70%, 60%,`;
                    glowColor = `hsla(${this.hue}, 70%, 60%, 0.5)`;
                } else if (layer.name === 'OCEAN') {
                    color = `hsla(${180 + this.hue * 0.4}, 80%, 55%,`;
                    glowColor = `hsla(${180 + this.hue * 0.4}, 80%, 55%, 0.6)`;
                } else if (layer.name === 'ABYSS') {
                    color = `hsla(${260 + this.hue * 0.3}, 90%, 45%,`;
                    glowColor = `hsla(${260 + this.hue * 0.3}, 90%, 45%, 0.7)`;
                } else {
                    color = `hsla(${this.hue}, 100%, 55%,`;
                    glowColor = `hsla(${this.hue}, 100%, 55%, 0.8)`;
                }
                
                ctx.shadowBlur = 25 + Math.sin(this.pulse) * 15;
                ctx.shadowColor = glowColor;
                ctx.strokeStyle = color + ' 0.9)';
                ctx.fillStyle = color + ' 0.15)';
                ctx.lineWidth = 3;
                
                switch(this.shape) {
                    case 0: this.drawRing(ctx); break;
                    case 1: this.drawStar(ctx); break;
                    case 2: this.drawCross(ctx); break;
                    case 3: this.drawSpiral(ctx); break;
                    case 4: this.drawGear(ctx); break;
                    case 5: this.drawCrystal(ctx); break;
                }
                
                ctx.restore();
            }
            
            drawRing(ctx) {
                const r = this.size * 0.5;
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(0, 0, r * 0.6, 0, Math.PI * 2);
                ctx.fill();
                
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(Math.cos(i * Math.PI/2) * r, Math.sin(i * Math.PI/2) * r);
                    ctx.stroke();
                }
            }
            
            drawStar(ctx) {
                const outer = this.size * 0.5;
                const inner = this.size * 0.25;
                const points = 5;
                
                ctx.beginPath();
                for (let i = 0; i < points * 2; i++) {
                    const r = i % 2 === 0 ? outer : inner;
                    const a = (Math.PI / points) * i - Math.PI / 2;
                    const x = Math.cos(a) * r;
                    const y = Math.sin(a) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(0, 0, inner * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = ctx.strokeStyle;
                ctx.fill();
            }
            
            drawCross(ctx) {
                const w = this.size * 0.2;
                const l = this.size * 0.5;
                
                ctx.beginPath();
                ctx.moveTo(-w, -l);
                ctx.lineTo(w, -l);
                ctx.lineTo(w, -w);
                ctx.lineTo(l, -w);
                ctx.lineTo(l, w);
                ctx.lineTo(w, w);
                ctx.lineTo(w, l);
                ctx.lineTo(-w, l);
                ctx.lineTo(-w, w);
                ctx.lineTo(-l, w);
                ctx.lineTo(-l, -w);
                ctx.lineTo(-w, -w);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(0, 0, w * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = ctx.strokeStyle;
                ctx.fill();
            }
            
            drawSpiral(ctx) {
                const maxR = this.size * 0.5;
                ctx.beginPath();
                for (let i = 0; i < 100; i++) {
                    const t = i / 100;
                    const r = t * maxR;
                    const a = t * Math.PI * 6;
                    const x = Math.cos(a) * r;
                    const y = Math.sin(a) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                
                for (let i = 0; i < 8; i++) {
                    const t = i / 8;
                    const r = t * maxR;
                    const a = t * Math.PI * 6;
                    ctx.beginPath();
                    ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            drawGear(ctx) {
                const outer = this.size * 0.5;
                const inner = this.size * 0.35;
                const teeth = 8;
                
                ctx.beginPath();
                for (let i = 0; i < teeth * 2; i++) {
                    const r = i % 2 === 0 ? outer : inner;
                    const a = (Math.PI / teeth) * i;
                    const x = Math.cos(a) * r;
                    const y = Math.sin(a) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(0, 0, inner * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
                ctx.stroke();
            }
            
            drawCrystal(ctx) {
                const h = this.size * 0.6;
                const w = this.size * 0.35;
                
                ctx.beginPath();
                ctx.moveTo(0, -h);
                ctx.lineTo(w, -h * 0.3);
                ctx.lineTo(w * 0.7, h);
                ctx.lineTo(-w * 0.7, h);
                ctx.lineTo(-w, -h * 0.3);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, -h);
                ctx.lineTo(0, h);
                ctx.moveTo(-w * 0.5, -h * 0.1);
                ctx.lineTo(w * 0.5, -h * 0.1);
                ctx.stroke();
            }
        }
        
        // ORB CLASS
        class Orb {
            constructor(y) {
                this.y = y;
                this.x = Math.random() * (width - 100) + 50;
                this.radius = 15 + Math.random() * 25;
                this.hue = Math.random() * 360;
                this.pulse = Math.random() * Math.PI * 2;
                this.collected = false;
                this.collectAnim = 0;
            }
            
            update() {
                this.pulse += 0.05;
                
                if (this.collected) {
                    this.collectAnim += 0.1;
                    return this.collectAnim < 1;
                }
                
                const screenY = this.y - scrollY;
                const dx = this.x - mouseX;
                const dy = screenY - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < this.radius + 20) {
                    this.collected = true;
                    for (let i = 0; i < 10; i++) {
                        particles.push(new Particle(this.x, screenY, this.hue));
                    }
                }
                
                return true;
            }
            
            draw(ctx, depth) {
                const screenY = this.y - scrollY;
                if (screenY < -100 || screenY > height + 100) return;
                
                const layer = getCurrentLayer(depth);
                
                ctx.save();
                ctx.translate(this.x, screenY);
                
                if (this.collected) {
                    const scale = 1 + this.collectAnim * 3;
                    const alpha = 1 - this.collectAnim;
                    ctx.scale(scale, scale);
                    ctx.globalAlpha = alpha;
                }
                
                const pulseRadius = this.radius + Math.sin(this.pulse) * 5;
                
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, pulseRadius * 3);
                let color;
                if (layer.name === 'SKY') color = `hsla(${this.hue}, 80%, 60%,`;
                else if (layer.name === 'OCEAN') color = `hsla(${180 + this.hue * 0.5}, 90%, 60%,`;
                else if (layer.name === 'ABYSS') color = `hsla(${280 + this.hue * 0.3}, 100%, 50%,`;
                else color = `hsla(${this.hue}, 100%, 60%,`;
                
                gradient.addColorStop(0, color + ' 0.8)');
                gradient.addColorStop(0.5, color + ' 0.3)');
                gradient.addColorStop(1, color + ' 0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, pulseRadius * 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = color + ' 1)';
                ctx.beginPath();
                ctx.arc(0, 0, pulseRadius * 0.5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // PARTICLE CLASS
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.hue = hue;
                this.size = 2 + Math.random() * 4;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= 0.02;
                return this.life > 0;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // FLOATING SHAPE CLASS
        class FloatingShape {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = 20 + Math.random() * 60;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.01;
                this.opacity = 0.05 + Math.random() * 0.1;
                this.hue = Math.random() * 360;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotSpeed;
                
                if (this.x < -100 || this.x > width + 100 || 
                    this.y < -100 || this.y > height + 100) {
                    this.reset();
                }
            }
            
            draw(ctx, depth) {
                const layer = getCurrentLayer(depth);
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                
                let color;
                if (layer.name === 'SKY') color = `hsl(${this.hue}, 60%, 70%)`;
                else if (layer.name === 'OCEAN') color = `hsl(${200}, 70%, 50%)`;
                else if (layer.name === 'ABYSS') color = `hsl(${270}, 80%, 40%)`;
                else color = `hsl(${this.hue}, 100%, 50%)`;
                
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.beginPath();
                
                const sides = 3 + Math.floor(Math.random() * 4);
                for (let i = 0; i < sides; i++) {
                    const angle = (Math.PI * 2 / sides) * i;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        // Initialize floating shapes
        for (let i = 0; i < 20; i++) {
            floatingShapes.push(new FloatingShape());
        }
        
        // SPAWN FUNCTIONS
        function spawnObstacles() {
            const spawnAhead = scrollY + height + 1000;
            let highestY = obstacles.length > 0 ? 
                Math.max(...obstacles.map(o => o.y)) : -500;
            
            while (highestY < spawnAhead) {
                const clusterSize = 1 + Math.floor(Math.random() * 4);
                const clusterY = highestY + OBSTACLE_DENSITY + Math.random() * 100;
                
                for (let i = 0; i < clusterSize; i++) {
                    obstacles.push(new Obstacle(clusterY + i * 40));
                }
                
                highestY = clusterY;
            }
            
            while (obstacles.length > 0 && obstacles[0].y < scrollY - 500) {
                obstacles.shift();
            }
        }
        
        function spawnOrbs() {
            const maxY = scrollY + height + 1000;
            
            while (orbs.length === 0 || orbs[orbs.length - 1].y < maxY) {
                const lastY = orbs.length > 0 ? orbs[orbs.length - 1].y : 200;
                orbs.push(new Orb(lastY + ORB_SPACING + Math.random() * 200));
            }
            
            while (orbs.length > 0 && orbs[0].y < scrollY - 500) {
                orbs.shift();
            }
        }
        
        // BACKGROUND RENDERING
        function drawBackground(depth) {
            const layer = getCurrentLayer(depth);
            let r, g, b;
            
            if (layer.name === 'SKY') {
                const t = depth / LAYERS.SKY.end;
                r = lerp(135, 100, t);
                g = lerp(206, 149, t);
                b = lerp(235, 237, t);
            } else if (layer.name === 'OCEAN') {
                const t = (depth - LAYERS.SKY.end) / (LAYERS.OCEAN.end - LAYERS.SKY.end);
                r = lerp(0, 0, t);
                g = lerp(105, 20, t);
                b = lerp(148, 60, t);
            } else if (layer.name === 'ABYSS') {
                const t = (depth - LAYERS.OCEAN.end) / (LAYERS.ABYSS.end - LAYERS.OCEAN.end);
                r = lerp(0, 10, t);
                g = lerp(20, 0, t);
                b = lerp(60, 30, t);
            } else {
                const t = Math.min((depth - LAYERS.ABYSS.end) / 5000, 1);
                r = lerp(10, 0, t);
                g = 0;
                b = lerp(30, 0, t);
            }
            
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, rgbToString(r * 0.5, g * 0.5, b * 0.5));
            grad.addColorStop(1, rgbToString(r, g, b));
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            
            const fogGrad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
            fogGrad.addColorStop(0, 'transparent');
            fogGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
            ctx.fillStyle = fogGrad;
            ctx.fillRect(0, 0, width, height);
        }
        
        // MAIN LOOP
        function loop() {
            if (!gameStarted) return;
            
            time += 0.016;
            scrollY += (targetScrollY - scrollY) * 0.1;
            
            document.getElementById('depth-value').textContent = Math.floor(scrollY / 10);
            const layer = getCurrentLayer(scrollY);
            document.getElementById('layer-indicator').textContent = layer.name;
            updateAudio(scrollY);
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            
            drawBackground(scrollY);
            
            floatingShapes.forEach(shape => {
                shape.update();
                shape.draw(ctx, scrollY);
            });
            
            // OBSTACLES
            spawnObstacles();
            obstacles.forEach(obs => {
                obs.update();
                obs.draw(ctx, scrollY);
            });
            
            // ORBS
            spawnOrbs();
            orbs.forEach((orb, i) => {
                if (!orb.update()) orbs.splice(i, 1);
                else orb.draw(ctx, scrollY);
            });
            
            // PARTICLES
            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].update()) particles.splice(i, 1);
                else particles[i].draw(ctx);
            }
            
            // Depth lines
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 5; i++) {
                const y = ((scrollY * 0.5 + i * 200) % height);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            
            requestAnimationFrame(loop);
        }
        
        // Start button
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').classList.add('hidden');
            gameStarted = true;
            document.body.style.height = '100000px';
            initAudio();
            loop();
            setTimeout(() => window.scrollTo({ top: 100, behavior: 'smooth' }), 500);
        });
        
        window.addEventListener('scroll', (e) => {
            if (!gameStarted) {
                window.scrollTo(0, 0);
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
