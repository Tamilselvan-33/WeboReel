<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Ghosts — You're Never Alone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Segoe UI', sans-serif;
            cursor: none;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .ui {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        
        .ui h1 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 3px;
            opacity: 0.9;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        
        .ui p {
            color: #888;
            font-size: 0.85rem;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        
        .stats {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 0.75rem;
            letter-spacing: 2px;
            pointer-events: none;
        }
        
        .custom-cursor {
            position: fixed;
            width: 12px;
            height: 12px;
            border: 2px solid #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: difference;
            transition: transform 0.1s;
        }
        
        .custom-cursor.clicking {
            transform: scale(1.5);
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="ui">
        <h1>GHOST CANVAS</h1>
        <p>Move to haunt. Click to leave your mark.</p>
    </div>
    
    <div class="stats" id="stats">
        <span id="ghostCount">0</span> GHOSTS PRESENT
    </div>
    
    <div class="custom-cursor" id="cursor"></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        const stats = document.getElementById('ghostCount');
        
        let width, height;
        let mouse = { x: 0, y: 0 };
        let isClicking = false;
        
        // Simulation data
        const ghosts = [];
        const orbs = [];
        const myTrail = [];
        const TRAIL_LENGTH = 20;
        const GHOST_COUNT = 8;
        
        // Color palettes for variety
        const colors = [
            '#ff6b6b', '#4ecdc4', '#ffe66d', '#a8e6cf',
            '#ff8b94', '#c7ceea', '#b4a7d6', '#ffd93d'
        ];
        
        // Resize handler
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // Mouse tracking
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            // Add to my trail
            myTrail.push({ x: mouse.x, y: mouse.y, life: 1 });
            if (myTrail.length > TRAIL_LENGTH) myTrail.shift();
        });
        
        document.addEventListener('mousedown', () => {
            isClicking = true;
            cursor.classList.add('clicking');
            
            // Create permanent orb
            orbs.push({
                x: mouse.x,
                y: mouse.y,
                color: colors[Math.floor(Math.random() * colors.length)],
                pulse: 0,
                born: Date.now()
            });
        });
        
        document.addEventListener('mouseup', () => {
            isClicking = false;
            cursor.classList.remove('clicking');
        });
        
        // Custom cursor follow
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 6 + 'px';
            cursor.style.top = e.clientY - 6 + 'px';
        });
        
        // Ghost class - simulated other users
        class Ghost {
            constructor() {
                this.reset();
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.trail = [];
                this.trailLength = 15 + Math.random() * 15;
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.targetX = Math.random() * width;
                this.targetY = Math.random() * height;
                this.speed = 0.5 + Math.random() * 2;
                this.pauseTime = 0;
            }
            
            update() {
                // Occasionally pick new target
                if (Math.random() < 0.02 || 
                    Math.hypot(this.targetX - this.x, this.targetY - this.y) < 50) {
                    this.targetX = Math.random() * width;
                    this.targetY = Math.random() * height;
                }
                
                // Pause occasionally (like real users)
                if (this.pauseTime > 0) {
                    this.pauseTime--;
                    return;
                }
                if (Math.random() < 0.01) {
                    this.pauseTime = 30 + Math.random() * 60;
                }
                
                // Move toward target
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const dist = Math.hypot(dx, dy);
                
                this.vx += (dx / dist) * 0.2;
                this.vy += (dy / dist) * 0.2;
                
                // Friction
                this.vx *= 0.95;
                this.vy *= 0.95;
                
                this.x += this.vx * this.speed;
                this.y += this.vy * this.speed;
                
                // Trail
                this.trail.push({ x: this.x, y: this.y, life: 1 });
                if (this.trail.length > this.trailLength) this.trail.shift();
                
                // Occasionally click (leave orb)
                if (Math.random() < 0.005) {
                    orbs.push({
                        x: this.x,
                        y: this.y,
                        color: this.color,
                        pulse: 0,
                        born: Date.now(),
                        isGhost: true
                    });
                }
            }
            
            draw() {
                // Draw trail
                this.trail.forEach((point, i) => {
                    point.life *= 0.95;
                    const alpha = point.life * 0.4;
                    const size = (i / this.trail.length) * 4;
                    
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                    ctx.fill();
                });
                
                // Draw cursor
                ctx.beginPath();
                ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, 10, 0, Math.PI * 2);
                ctx.strokeStyle = this.color + '60';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        // Initialize ghosts
        for (let i = 0; i < GHOST_COUNT; i++) {
            ghosts.push(new Ghost());
        }
        
        // Animation loop
        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // Update and draw ghosts
            ghosts.forEach(ghost => {
                ghost.update();
                ghost.draw();
            });
            
            // Draw my trail
            myTrail.forEach((point, i) => {
                point.life *= 0.92;
                const alpha = point.life;
                const size = (i / myTrail.length) * 6;
                
                ctx.beginPath();
                ctx.arc(point.x, point.y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.6})`;
                ctx.fill();
            });
            
            // Clean old trail points
            for (let i = myTrail.length - 1; i >= 0; i--) {
                if (myTrail[i].life < 0.01) myTrail.splice(i, 1);
            }
            
            // Draw orbs
            const now = Date.now();
            orbs.forEach((orb, i) => {
                orb.pulse += 0.05;
                const age = (now - orb.born) / 1000;
                const life = Math.max(0, 1 - age / 30); // Last 30 seconds
                
                if (life <= 0) {
                    orbs.splice(i, 1);
                    return;
                }
                
                const pulseSize = Math.sin(orb.pulse) * 3;
                const baseSize = 8;
                
                // Outer glow
                const gradient = ctx.createRadialGradient(
                    orb.x, orb.y, 0,
                    orb.x, orb.y, baseSize + pulseSize + 20
                );
                gradient.addColorStop(0, orb.color + Math.floor(life * 255).toString(16).padStart(2, '0'));
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(orb.x, orb.y, baseSize + pulseSize + 20, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // Core
                ctx.beginPath();
                ctx.arc(orb.x, orb.y, baseSize, 0, Math.PI * 2);
                ctx.fillStyle = orb.color;
                ctx.fill();
            });
            
            // Update stats
            stats.textContent = ghosts.length + 1; // +1 for you
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Touch support for mobile
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
            myTrail.push({ x: mouse.x, y: mouse.y, life: 1 });
            if (myTrail.length > TRAIL_LENGTH) myTrail.shift();
        }, { passive: false });
        
        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            orbs.push({
                x: touch.clientX,
                y: touch.clientY,
                color: '#fff',
                pulse: 0,
                born: Date.now()
            });
        });
    </script>
</body>
</html>
